kind = "web"
previewPath = "/"
title = "AfuChat Website"
version = "1.0.0"
id = "artifacts/afuchat-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18182

[services.development]
run = "pnpm --filter @workspace/afuchat-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/afuchat-website", "run", "build" ]
run = "pnpm --filter @workspace/afuchat-website run start"
